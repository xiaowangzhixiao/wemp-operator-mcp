services:
  wemp-operator-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: wemp-operator-mcp:local
    container_name: wemp-operator-mcp
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3333:3333"
    volumes:
      - wemp-operator-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3333/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  wemp-operator-data:
